img</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">calc_grad_tiled</span><span class="params">(img, t_grad, tile_size=<span class="number">512</span>)</span>:</span></span><br><span class="line">    <span class="comment"># 每次只对tile_size×tile_size大小的图像计算梯度，避免内存问题</span></span><br><span class="line">    sz = tile_size</span><br><span class="line">    h, w = img.shape[:<span class="number">2</span>]</span><br><span class="line">    <span class="comment"># img_shift：先在行上做整体移动，再在列上做整体移动</span></span><br><span class="line">    <span class="comment"># 防止在tile的边缘产生边缘效应</span></span><br><span class="line">    sx, sy = np.random.randint(sz, size=<span class="number">2</span>)</span><br><span class="line">    img_shift = np.roll(np.roll(img, sx, <span class="number">1</span>), sy, <span class="number">0</span>)</span><br><span class="line">    grad = np.zeros_like(img)</span><br><span class="line">    <span class="comment"># y, x是开始位置的像素</span></span><br><span class="line">    <span class="keyword">for</span> y <span class="keyword">in</span> range(<span class="number">0</span>, max(h - sz // <span class="number">2</span>, sz), sz):</span><br><span class="line">        <span class="keyword">for</span> x <span class="keyword">in</span> range(<span class="number">0</span>, max(w - sz // <span class="number">2</span>, sz), sz):</span><br><span class="line">            <span class="comment"># 每次对sub计算梯度。sub的大小是tile_size×tile_size</span></span><br><span class="line">            sub = img_shift[y:y + sz, x:x + sz]</span><br><span class="line">            g = sess.run(t_grad, &#123;t_input: sub&#125;)</span><br><span class="line">            grad[y:y + sz, x:x + sz] = g</span><br><span class="line">    <span class="comment"># 使用np.roll移动回去</span></span><br><span class="line">    <span class="keyword">return</span> np.roll(np.roll(grad, -sx, <span class="number">1</span>), -sy, <span class="number">0</span>)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">render_multiscale</span><span class="params">(t_obj, img0, iter_n=<span class="number">10</span>, step=<span class="number">1.0</span>, octave_n=<span class="number">3</span>, octave_scale=<span class="number">1.4</span>)</span>:</span></span><br><span class="line">    <span class="comment"># 同样定义目标和梯度</span></span><br><span class="line">    t_score = tf.reduce_mean(t_obj)</span><br><span class="line">    t_grad = tf.gradients(t_score, t_input)[<span class="number">0</span>]</span><br><span class="line"></span><br><span class="line">    img = img0.copy()</span><br><span class="line">    <span class="keyword">for</span> octave <span class="keyword">in</span> range(octave_n):</span><br><span class="line">        <span class="keyword">if</span> octave &gt; <span class="number">0</span>:</span><br><span class="line">            <span class="comment"># 每次将将图片放大octave_scale倍</span></span><br><span class="line">            <span class="comment"># 共放大octave_n - 1 次</span></span><br><span class="line">            img = resize_ratio(img, octave_scale)</span><br><span class="line">        <span class="keyword">for</span> i <span class="keyword">in</span> range(iter_n):</span><br><span class="line">            <span class="comment"># 调用calc_grad_tiled计算任意大小图像的梯度</span></span><br><span class="line">            g = calc_grad_tiled(img, t_grad)</span><br><span class="line">            g /= g.std() + <span class="number">1e-8</span></span><br><span class="line">            img += g * step</span><br><span class="line">            print(<span class="string">'.'</span>, end=<span class="string">' '</span>)</span><br><span class="line">    savearray(img, <span class="string">'multiscale.jpg'</span>)</span><br></pre></td></tr></table></figure>
