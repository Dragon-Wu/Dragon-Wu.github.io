ine">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br><span class="line">138</span><br><span class="line">139</span><br><span class="line">140</span><br><span class="line">141</span><br><span class="line">142</span><br><span class="line">143</span><br><span class="line">144</span><br><span class="line">145</span><br><span class="line">146</span><br><span class="line">147</span><br><span class="line">148</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#!/usr/bin/python3</span></span><br><span class="line"><span class="comment"># -*- coding: utf-8 -*-</span></span><br><span class="line"><span class="comment"># @Time    : 2018/7/19 10:17</span></span><br><span class="line"><span class="comment"># @Author  : DaiPuwei</span></span><br><span class="line"><span class="comment"># @Finumame: GMM.py</span></span><br><span class="line"><span class="comment"># @Software: PyCharm</span></span><br><span class="line"><span class="comment"># @E-mail  ：771830171@qq.com</span></span><br><span class="line"><span class="comment"># @Blog    ：https://blog.csdn.net/qq_30091945</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> numpy <span class="keyword">as</span> np</span><br><span class="line"><span class="keyword">import</span> matplotlib <span class="keyword">as</span> mpl</span><br><span class="line"><span class="keyword">import</span> matplotlib.pyplot <span class="keyword">as</span> plt</span><br><span class="line"><span class="keyword">from</span> sklearn.datasets <span class="keyword">import</span> load_iris</span><br><span class="line"><span class="keyword">from</span> sklearn.preprocessing <span class="keyword">import</span> Normalizer</span><br><span class="line"><span class="keyword">from</span> sklearn.metrics <span class="keyword">import</span> accuracy_score</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">GMM</span>:</span></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__init__</span><span class="params">(self,Data,K,weights = None,means = None,covars = None)</span>:</span></span><br><span class="line">        <span class="string">"""</span></span><br><span class="line"><span class="string">        这是GMM（高斯混合模型）类的构造函数</span></span><br><span class="line"><span class="string">        :param Data: 训练数据</span></span><br><span class="line"><span class="string">        :param K: 高斯分布的个数</span></span><br><span class="line"><span class="string">        :param weigths: 每个高斯分布的初始概率（权重）</span></span><br><span class="line"><span class="string">        :param means: 高斯分布的均值向量</span></span><br><span class="line"><span class="string">        :param covars: 高斯分布的协方差矩阵集合</span></span><br><span class="line"><span class="string">        """</span></span><br><span class="line">        self.Data = Data</span><br><span class="line">        self.K = K</span><br><span class="line">        <span class="keyword">if</span> weights <span class="keyword">is</span> <span class="keyword">not</span> <span class="keyword">None</span>:</span><br><span class="line">            self.weights = weights</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            self.weights  = np.random.rand(self.K)</span><br><span class="line">            self.weights /= np.sum(self.weights)        <span class="comment"># 归一化</span></span><br><span class="line">        col = np.shape(self.Data)[<span class="number">1</span>]</span><br><span class="line">        <span class="keyword">if</span> means <span class="keyword">is</span> <span class="keyword">not</span> <span class="keyword">None</span>:</span><br><span class="line">            self.means = means</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            self.means = []</span><br><span class="line">            <span class="keyword">for</span> i <span class="keyword">in</span> range(self.K):</span><br><span class="line">                mean = np.random.rand(col)</span><br><span class="line">                <span class="comment">#mean = mean / np.sum(mean)        # 归一化</span></span><br><span class="line">                self.means.append(mean)</span><br><span class="line">        <span class="keyword">if</span> covars <span class="keyword">is</span> <span class="keyword">not</span> <span class="keyword">None</span>:</span><br><span class="line">            self.covars = covars</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            self.covars  = []</span><br><span class="line">            <span class="keyword">for</span> i <span class="keyword">in</span> range(self.K):</span><br><span class="line">                cov = np.random.rand(col,col)</span><br><span class="line">                <span class="comment">#cov = cov / np.sum(cov)                    # 归一化</span></span><br><span class="line">                self.covars.append(cov)                     <span class="comment"># cov是np.array,但是self.covars是list</span></span><br><span class="line"></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">Gaussian</span><span class="params">(self,x,mean,cov)</span>:</span></span><br><span class="line">        <span class="string">"""</span></span><br><span class="line"><span class="string">        这是自定义的高斯分布概率密度函数</span></span><br><span class="line"><span class="string">        :param x: 输入数据</span></span><br><span class="line"><span class="string">        :param mean: 均值数组</span></span><br><span class="line"><span class="string">        :param cov: 协方差矩阵</span></span><br><span class="line"><span class="string">        :return: x的概率</span></span><br><span class="line"><span class="string">        """</span></span><br><span class="line">        dim = np.shape(cov)[<span class="number">0</span>]</span><br><span class="line">        <span class="comment"># cov的行列式为零时的措施</span></span><br><span class="line">        covdet = np.linalg.det(cov + np.eye(dim) * <span class="number">0.001</span>)</span><br><span class="line">        covinv = np.linalg.inv(cov + np.eye(dim) * <span class="number">0.001</span>)</span><br><span class="line">        xdiff = (x - mean).reshape((<span class="number">1</span>,dim))</span><br><span class="line">        <span class="comment"># 概率密度</span></span><br><span class="line">        prob = <span class="number">1.0</span>/(np.power(np.power(<span class="number">2</span>*np.pi,dim)*np.abs(covdet),<span class="number">0.5</span>))*\</span><br><span class="line">               np.exp(<span class="number">-0.5</span>*xdiff.dot(covinv).dot(xdiff.T))[<span class="number">0</span>][<span class="number">0</span>]</span><br><span class="line">        <span class="keyword">return</span> prob</span><br><span class="line"></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">GMM_EM</span><span class="params">(self)</span>:</span></span><br><span class="line">        <span class="string">"""</span></span><br><span class="line"><span class="string">        这是利用EM算法进行优化GMM参数的函数</span></span><br><span class="line"><span class="string">        :return: 返回各组数据的属于每个分类的概率</span></span><br><span class="line"><span class="string">        """</span></span><br><span class="line">        loglikelyhood = <span class="number">0</span></span><br><span class="line">        oldloglikelyhood = <span class="number">1</span></span><br><span class="line">        num,dim = np.shape(self.Data)</span><br><span class="line">        <span class="comment"># gamma表示第n个样本属于第k个混合高斯的概率</span></span><br><span class="line">        gammas = [np.zeros(self.K) <span class="keyword">for</span> i <span class="keyword">in</span> range(num)]</span><br><span class="line">        <span class="keyword">while</span> np.abs(loglikelyhood-oldloglikelyhood) &gt; <span class="number">0.00000001</span>:</span><br><span class="line">            oldloglikelyhood = loglikelyhood</span><br><span class="line">            <span class="comment"># E-step</span></span><br><span class="line">            <span class="keyword">for</span> n <span class="keyword">in</span> range(num):</span><br><span class="line">                <span class="comment"># respons是GMM的EM算法中的权重w，即后验概率</span></span><br><span class="line">                respons = [self.weights[k] * self.Gaussian(self.Data[n], self.means[k], self.covars[k])</span><br><span class="line">                                                    <span class="keyword">for</span> k <span class="keyword">in</span> range(self.K)]</span><br><span class="line">                respons = np.array(respons)</span><br><span class="line">                sum_respons = np.sum(respons)</span><br><span class="line">                gammas[n] = respons/sum_respons</span><br><span class="line">            <span class="comment"># M-step</span></span><br><span class="line">            <span class="keyword">for</span> k <span class="keyword">in</span> range(self.K):</span><br><span class="line">                <span class="comment">#nk表示N个样本中有多少属于第k个高斯</span></span><br><span class="line">                nk = np.sum([gammas[n][k] <span class="keyword">for</span> n <span class="keyword">in</span> range(num)])</span><br><span class="line">                <span class="comment"># 更新每个高斯分布的概率</span></span><br><span class="line">                self.weights[k] = <span class="number">1.0</span> * nk / num</span><br><span class="line">                <span class="comment"># 更新高斯分布的均值</span></span><br><span class="line">                self.means[k] = (<span class="number">1.0</span>/nk) * np.sum([gammas[n][k] * self.Data[n] <span class="keyword">for</span> n <span class="keyword">in</span> range(num)], axis=<span class="number">0</span>)</span><br><span class="line">                xdiffs = self.Data - self.means[k]</span><br><span class="line">                <span class="comment"># 更新高斯分布的协方差矩阵</span></span><br><span class="line">                self.covars[k] = (<span class="number">1.0</span>/nk)*np.sum([gammas[n][k]*xdiffs[n].reshape((dim,<span class="number">1</span>)).dot(xdiffs[n].reshape((<span class="number">1</span>,dim))) <span class="keyword">for</span> n <span class="keyword">in</span> range(num)],axis=<span class="number">0</span>)</span><br><span class="line">            loglikelyhood = []</span><br><span class="line">            <span class="keyword">for</span> n <span class="keyword">in</span> range(num):</span><br><span class="line">                tmp = [np.sum(self.weights[k]*self.Gaussian(self.Data[n],self.means[k],self.covars[k])) <span class="keyword">for</span> k <span class="keyword">in</span> range(self.K)]</span><br><span class="line">                tmp = np.log(np.array(tmp))</span><br><span class="line">                loglikelyhood.append(list(tmp))</span><br><span class="line">            loglikelyhood = np.sum(loglikelyhood)</span><br><span class="line">        <span class="keyword">for</span> i <span class="keyword">in</span> range(num):</span><br><span class="line">            gammas[i] = gammas[i]/np.sum(gammas[i])</span><br><span class="line">        self.posibility = gammas</span><br><span class="line">        self.prediction = [np.argmax(gammas[i]) <span class="keyword">for</span> i <span class="keyword">in</span> range(num)]</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">run_main</span><span class="params">()</span>:</span></span><br><span class="line">    <span class="string">"""</span></span><br><span class="line"><span class="string">        这是主函数</span></span><br><span class="line"><span class="string">    """</span></span><br><span class="line">    <span class="comment"># 导入Iris数据集</span></span><br><span class="line">    iris = load_iris()</span><br><span class="line">    label = np.array(iris.target)</span><br><span class="line">    data = np.array(iris.data)</span><br><span class="line">    print(<span class="string">"Iris数据集的标签：\n"</span>,label)</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 对数据进行预处理</span></span><br><span class="line">    data = Normalizer().fit_transform(data)</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 解决画图是的中文乱码问题</span></span><br><span class="line">    mpl.rcParams[<span class="string">'font.sans-serif'</span>] = [<span class="string">u'simHei'</span>]</span><br><span class="line">    mpl.rcParams[<span class="string">'axes.unicode_minus'</span>] = <span class="keyword">False</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 数据可视化</span></span><br><span class="line">    plt.scatter(data[:,<span class="number">0</span>],data[:,<span class="number">1</span>],c = label)</span><br><span class="line">    plt.title(<span class="string">"Iris数据集显示"</span>)</span><br><span class="line">    plt.show()</span><br><span class="line"></span><br><span class="line">    np.random.seed(<span class="number">13</span>)</span><br><span class="line">    <span class="comment"># GMM模型</span></span><br><span class="line">    K = <span class="number">3</span></span><br><span class="line">    gmm = GMM(data,K)</span><br><span class="line">    gmm.GMM_EM()</span><br><span class="line">    y_pre = gmm.prediction</span><br><span class="line">    print(<span class="string">"GMM预测结果：\n"</span>,y_pre)</span><br><span class="line">    print(<span class="string">"GMM正确率为：\n"</span>,accuracy_score(label,y_pre))</span><br><span class="line">    plt.scatter(data[:, <span class="number">0</span>], data[:, <span class="number">1</span>], c=y_pre)</span><br><span class="line">    plt.title(<span class="string">"GMM结果显示"</span>)</span><br><span class="line">    plt.show()</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">'__main__'</span>:</span><br><span class="line">    run_main()</span><br></pre></td></tr></table></figure>
