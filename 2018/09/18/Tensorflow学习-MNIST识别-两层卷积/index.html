ine">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br><span class="line">138</span><br><span class="line">139</span><br><span class="line">140</span><br><span class="line">141</span><br><span class="line">142</span><br><span class="line">143</span><br><span class="line">144</span><br><span class="line">145</span><br><span class="line">146</span><br><span class="line">147</span><br><span class="line">148</span><br><span class="line">149</span><br><span class="line">150</span><br><span class="line">151</span><br><span class="line">152</span><br><span class="line">153</span><br><span class="line">154</span><br><span class="line">155</span><br><span class="line">156</span><br><span class="line">157</span><br><span class="line">158</span><br><span class="line">159</span><br><span class="line">160</span><br><span class="line">161</span><br><span class="line">162</span><br><span class="line">163</span><br><span class="line">164</span><br><span class="line">165</span><br><span class="line">166</span><br><span class="line">167</span><br><span class="line">168</span><br><span class="line">169</span><br><span class="line">170</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#导入Tensorflow库</span></span><br><span class="line"><span class="keyword">import</span> tensorflow <span class="keyword">as</span> tf</span><br><span class="line"></span><br><span class="line"><span class="comment">#导入MNIST数据样例库</span></span><br><span class="line"><span class="keyword">from</span> tensorflow.examples.tutorials.mnist <span class="keyword">import</span> input_data</span><br><span class="line"></span><br><span class="line"><span class="comment">#导入Tensorboard用于显示训练过程</span></span><br><span class="line"><span class="keyword">import</span> tensorboard</span><br><span class="line"></span><br><span class="line"><span class="comment">#从MNIST数据库中读取数据</span></span><br><span class="line">mnist = input_data.read_data_sets(<span class="string">"MNIST_data/"</span>,one_hot=<span class="keyword">True</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#定义输入输出的维度，使用占位符并定义矩阵格式</span></span><br><span class="line">x = tf.placeholder(tf.float32,[<span class="keyword">None</span>,<span class="number">784</span>])</span><br><span class="line">y_ = tf.placeholder(tf.float32,[<span class="keyword">None</span>,<span class="number">10</span>])</span><br><span class="line"></span><br><span class="line"><span class="comment">#使用reshape将原始的数据进行转换，使784维向量成为28*28*1的矩阵图片</span></span><br><span class="line">x_image = tf.reshape(x,[<span class="number">-1</span>,<span class="number">28</span>,<span class="number">28</span>,<span class="number">1</span>])</span><br><span class="line"></span><br><span class="line"><span class="comment">#试输出转换后的数据形式</span></span><br><span class="line">x_image</span><br><span class="line">OUT：</span><br><span class="line">&lt;tf.Tensor 'Reshape:0' shape=(?, 28, 28, 1) dtype=float32&gt;</span><br><span class="line"></span><br><span class="line"><span class="comment">#定义权重层，shape为权重层数据的格式，n为当前层数</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">weight_variable</span><span class="params">(shape,n)</span>:</span></span><br><span class="line">    <span class="keyword">with</span> tf.name_scope(<span class="string">'weight_variable_%s'</span> % n):</span><br><span class="line">        <span class="comment">#通过tf.truncated_normal来初始化权重</span></span><br><span class="line">        <span class="comment">#该方法使用2倍的stddev来截断正态分布，选取随机值</span></span><br><span class="line">        initial = tf.truncated_normal(shape,stddev=<span class="number">0.1</span>)</span><br><span class="line">        <span class="keyword">return</span> tf.Variable(initial)</span><br><span class="line"></span><br><span class="line"><span class="comment">#定义偏置层，shape为偏置的格式，n为当前层数</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">bias_variable</span><span class="params">(shape,n)</span>:</span></span><br><span class="line">    <span class="keyword">with</span> tf.name_scope(<span class="string">'bias_variable_%s'</span> % n):</span><br><span class="line">        <span class="comment">#通过定义常数张量初始化偏置</span></span><br><span class="line">        initial = tf.constant(<span class="number">0.1</span>,shape=shape)</span><br><span class="line">        <span class="keyword">return</span> tf.Variable(initial)</span><br><span class="line"></span><br><span class="line"><span class="comment">#卷积层，x为输入矩阵，w为卷积的核</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">conv2d</span><span class="params">(x,w,n)</span>:</span></span><br><span class="line">    <span class="keyword">with</span> tf.name_scope(<span class="string">'Convolution_layer_%s'</span> % n):</span><br><span class="line">        <span class="comment">#strides为步长，padding选择SAME</span></span><br><span class="line">        <span class="keyword">return</span> tf.nn.conv2d(x,w,strides=[<span class="number">1</span>,<span class="number">1</span>,<span class="number">1</span>,<span class="number">1</span>],padding=<span class="string">'SAME'</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#池化层，x为输入矩阵，n为当前层数</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">maxpool_2x2</span><span class="params">(x,n)</span>:</span></span><br><span class="line">    <span class="keyword">with</span> tf.name_scope(<span class="string">'pooling_%s'</span> % n):</span><br><span class="line">        <span class="comment">#ksize池化窗口大小，</span></span><br><span class="line">        <span class="comment">#strides窗口每个维度的滑动步长</span></span><br><span class="line">        <span class="keyword">return</span> tf.nn.max_pool(x,ksize=[<span class="number">1</span>,<span class="number">2</span>,<span class="number">2</span>,<span class="number">1</span>],strides=[<span class="number">1</span>,<span class="number">2</span>,<span class="number">2</span>,<span class="number">1</span>],padding=<span class="string">'SAME'</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#定义第一层的权重、偏置</span></span><br><span class="line">W_conv1 = weight_variable([<span class="number">5</span>,<span class="number">5</span>,<span class="number">1</span>,<span class="number">32</span>],<span class="number">1</span>)</span><br><span class="line">b_conv1 = bias_variable([<span class="number">32</span>],<span class="number">1</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#进行第一层的卷积</span></span><br><span class="line">h_conv1 = tf.nn.relu(conv2d(x_image,W_conv1,<span class="number">1</span>) + b_conv1)</span><br><span class="line"></span><br><span class="line"><span class="comment">#对第一层卷积的结果进行池化</span></span><br><span class="line">h_pool1 = maxpool_2x2(h_conv1,<span class="number">1</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#定义第二层的权重、偏置</span></span><br><span class="line">W_conv2 = weight_variable([<span class="number">5</span>, <span class="number">5</span>, <span class="number">32</span>, <span class="number">64</span>],<span class="number">2</span>)</span><br><span class="line">b_conv2 = bias_variable([<span class="number">64</span>],<span class="number">2</span>).</span><br><span class="line"></span><br><span class="line"><span class="comment">#进行第二层的卷积</span></span><br><span class="line">h_conv2 = tf.nn.relu(conv2d(h_pool1, W_conv2,<span class="number">2</span>) + b_conv2)</span><br><span class="line"></span><br><span class="line"><span class="comment">#对第二层卷积的结果进行池化</span></span><br><span class="line">h_pool2 = maxpool_2x2(h_conv2,<span class="number">2</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#两次的卷积由于padding,都没有缩小维数，</span></span><br><span class="line"><span class="comment">#但是pooling的时候，每次都缩小了2倍，则最后28/2/2=7，维数为7*7，通道为64</span></span><br><span class="line">W_fc1 = weight_variable([<span class="number">7</span> * <span class="number">7</span> * <span class="number">64</span>,<span class="number">1024</span>],<span class="string">'fc1'</span>)</span><br><span class="line">b_fc1 = bias_variable([<span class="number">1024</span>],<span class="string">'fc1'</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#又将7*7*64的图片格式，转化为7*7*64维的向量</span></span><br><span class="line">h_pool2_flat = tf.reshape(h_pool2,[<span class="number">-1</span>,<span class="number">7</span> * <span class="number">7</span> * <span class="number">64</span>])</span><br><span class="line">h_fc1 = tf.nn.relu(tf.matmul(h_pool2_flat,W_fc1) + b_fc1)</span><br><span class="line"></span><br><span class="line"><span class="comment">#dropout的比例</span></span><br><span class="line">keep_prob = tf.placeholder(tf.float32)</span><br><span class="line">h_fc1_drop = tf.nn.dropout(h_fc1,keep_prob)</span><br><span class="line"></span><br><span class="line"><span class="comment">#最后全连接层，准备输出</span></span><br><span class="line">W_fc2 = weight_variable([<span class="number">1024</span>,<span class="number">10</span>],<span class="string">'fc2'</span>)</span><br><span class="line">b_fc2 = bias_variable([<span class="number">10</span>],<span class="string">'fc2'</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#输出预测层</span></span><br><span class="line">y_conv = tf.matmul(h_fc1_drop,W_fc2) + b_fc2</span><br><span class="line"></span><br><span class="line"><span class="comment">#定义交叉熵为损失函数</span></span><br><span class="line">cross_entropy = tf.reduce_mean(tf.nn.softmax_cross_entropy_with_logits(labels=y_,logits=y_conv))</span><br><span class="line"></span><br><span class="line"><span class="comment">#定义训练步骤，使用AadmOptimizer最小化损失函数——交叉熵</span></span><br><span class="line">train_step = tf.train.AdamOptimizer(<span class="number">1e-4</span>).minimize(cross_entropy)</span><br><span class="line"></span><br><span class="line"><span class="comment">#获得正确样本</span></span><br><span class="line">correct_prediction = tf.equal(tf.argmax(y_conv, <span class="number">1</span>),tf.argmax(y_,<span class="number">1</span>))</span><br><span class="line"></span><br><span class="line"><span class="comment">#取得准确率</span></span><br><span class="line">accuracy= tf.reduce_mean(tf.cast(correct_prediction,tf.float32))</span><br><span class="line"></span><br><span class="line"><span class="comment">#初始化Session会话</span></span><br><span class="line">sess = tf.Session()</span><br><span class="line"></span><br><span class="line"><span class="comment">#将所有定义的Summary操作进行整合</span></span><br><span class="line">merged = tf.summary.merge_all()</span><br><span class="line"></span><br><span class="line"><span class="comment">#保存Summary的图形结构</span></span><br><span class="line">writer = tf.summary.FileWriter(<span class="string">"logofmnist2/"</span>,sess.graph)</span><br><span class="line"></span><br><span class="line"><span class="comment">#初始化所有变量，准备启动Session</span></span><br><span class="line">sess.run(tf.global_variables_initializer())</span><br><span class="line"></span><br><span class="line"><span class="comment">#开始训练</span></span><br><span class="line"><span class="comment">#定义训练次数为20000次</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">20000</span>):</span><br><span class="line">    <span class="comment">#选取100个样本作为一批训练样本</span></span><br><span class="line">    batch = mnist.train.next_batch(<span class="number">100</span>)</span><br><span class="line">    <span class="comment">#进行训练，定义输入与标签，并定义dropout概率为0.5</span></span><br><span class="line">    sess.run(train_step,feed_dict=&#123;x:batch[<span class="number">0</span>],y_:batch[<span class="number">1</span>],keep_prob:<span class="number">0.5</span>&#125;)</span><br><span class="line">    <span class="comment">#每一百次训练输出正确率</span></span><br><span class="line">    <span class="keyword">if</span> i % <span class="number">100</span> == <span class="number">0</span>:</span><br><span class="line">        train_accuracy = accuracy.eval(session=sess,feed_dict=&#123;x: batch[<span class="number">0</span>], y_: batch[<span class="number">1</span>], keep_prob: <span class="number">1.0</span>&#125;)</span><br><span class="line">        <span class="keyword">print</span> (<span class="string">"step %d, training accuracy %g"</span> % (i,train_accuracy))</span><br><span class="line">        <span class="comment">#result = sees.run(merged,feed_dict=&#123;x:batch[0],y:batch[1]&#125;)</span></span><br><span class="line">        <span class="comment">#writer.add_summary(result,i)</span></span><br><span class="line"></span><br><span class="line">OUT: </span><br><span class="line">step <span class="number">0</span>, training accuracy <span class="number">0.19</span> step <span class="number">100</span>, training accuracy <span class="number">0.92</span></span><br><span class="line"></span><br><span class="line">step <span class="number">200</span>, training accuracy <span class="number">0.89</span> step <span class="number">300</span>, training accuracy <span class="number">0.88</span></span><br><span class="line"></span><br><span class="line">step <span class="number">400</span>, training accuracy <span class="number">0.94</span> step <span class="number">500</span>, training accuracy <span class="number">0.91</span></span><br><span class="line"></span><br><span class="line">step <span class="number">600</span>, training accuracy <span class="number">0.98</span> step <span class="number">700</span>, training accuracy <span class="number">0.95</span></span><br><span class="line"></span><br><span class="line">step <span class="number">800</span>, training accuracy <span class="number">0.97</span> step <span class="number">900</span>, training accuracy <span class="number">0.94</span></span><br><span class="line"></span><br><span class="line">step <span class="number">1000</span>, training accuracy <span class="number">0.93</span> step <span class="number">1100</span>, training accuracy <span class="number">0.96</span></span><br><span class="line"></span><br><span class="line">step <span class="number">1200</span>, training accuracy <span class="number">0.99</span> step <span class="number">1300</span>, training accuracy <span class="number">0.94</span></span><br><span class="line"></span><br><span class="line">step <span class="number">1400</span>, training accuracy <span class="number">0.98</span> step <span class="number">1500</span>, training accuracy <span class="number">0.98</span></span><br><span class="line"></span><br><span class="line">step <span class="number">1600</span>, training accuracy <span class="number">0.97</span> step <span class="number">1700</span>, training accuracy <span class="number">0.98</span></span><br><span class="line"></span><br><span class="line">step <span class="number">1800</span>, training accuracy <span class="number">0.99</span> step <span class="number">1900</span>, training accuracy <span class="number">0.96</span></span><br><span class="line"></span><br><span class="line">step <span class="number">2000</span>, training accuracy <span class="number">0.99</span> step <span class="number">2100</span>, training accuracy <span class="number">0.97</span></span><br><span class="line"></span><br><span class="li
