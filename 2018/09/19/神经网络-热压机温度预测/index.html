ass="line">yof1 = []</span><br><span class="line"><span class="keyword">for</span> line <span class="keyword">in</span> fofresult.readlines():</span><br><span class="line">    line = line.split(<span class="string">'\n'</span>)</span><br><span class="line">    <span class="keyword">for</span> a <span class="keyword">in</span> line[<span class="number">0</span>].split(<span class="string">'\t'</span>):</span><br><span class="line">        yof1.append(float(a))</span><br><span class="line">fofresult.close()</span><br><span class="line"></span><br><span class="line">yof1 = np.array(yof1)</span><br><span class="line">yof1 = yof1.reshape(<span class="number">-1</span>,<span class="number">1</span>)</span><br><span class="line"></span><br><span class="line"><span class="keyword">with</span> tf.name_scope(<span class="string">'inputsoft'</span>):</span><br><span class="line">    xoft = tf.placeholder(tf.float32,[<span class="keyword">None</span>,<span class="number">5</span>])</span><br><span class="line">    yoft = tf.placeholder(tf.float32,[<span class="keyword">None</span>,<span class="number">1</span>])</span><br><span class="line">    </span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">add_layer</span><span class="params">(name,x,sizeofin,sizeofout,activation_function=None)</span>:</span></span><br><span class="line">    nameoflayer = <span class="string">"layer_&#123;&#125;"</span>.format(name)</span><br><span class="line">    <span class="keyword">with</span> tf.name_scope(nameoflayer):</span><br><span class="line">        <span class="keyword">with</span> tf.name_scope(<span class="string">"weights"</span>):</span><br><span class="line">            Weights = tf.Variable(tf.truncated_normal([sizeofin,sizeofout]),name=<span class="string">"W"</span>)</span><br><span class="line">            tf.summary.histogram(nameoflayer+<span class="string">"/weights"</span>,Weights)</span><br><span class="line">        <span class="keyword">with</span> tf.name_scope(<span class="string">"bias"</span>):</span><br><span class="line">            biases = tf.Variable(tf.random_normal([<span class="number">1</span>,sizeofout]),name=<span class="string">"b"</span>)</span><br><span class="line">        <span class="keyword">with</span> tf.name_scope(<span class="string">"Wx_add_b"</span>):</span><br><span class="line">            Wx_add_b = tf.add(tf.matmul(x,Weights),biases)</span><br><span class="line">            </span><br><span class="line">        <span class="keyword">if</span> activation_function <span class="keyword">is</span> <span class="keyword">None</span>:</span><br><span class="line">            outputs = Wx_add_b</span><br><span class="line">        <span class="keyword">else</span> :</span><br><span class="line">            outputs = activation_function(Wx_add_b,)</span><br><span class="line">        tf.summary.histogram(nameoflayer+<span class="string">"/outputs"</span>,outputs)</span><br><span class="line">    <span class="keyword">return</span> outputs</span><br><span class="line"></span><br><span class="line"><span class="comment">#隐藏层，扩展到100个节点</span></span><br><span class="line">layer1oft = add_layer(<span class="string">"hiddenoft"</span>,xoft,<span class="number">5</span>,<span class="number">15</span>,activation_function=tf.nn.sigmoid)</span><br><span class="line"></span><br><span class="line"><span class="comment">#预测层，压缩到1个节点输出</span></span><br><span class="line">predictionoft = add_layer(<span class="string">"predictionoft"</span>,layer1oft,<span class="number">15</span>,<span class="number">1</span>,activation_function=<span class="keyword">None</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#定义温度网络的损失函数</span></span><br><span class="line"><span class="keyword">with</span> tf.name_scope(<span class="string">'lossoft'</span>):</span><br><span class="line">    lossoft = tf.reduce_mean(</span><br><span class="line">        tf.reduce_sum(tf.square(yoft-predictionoft),reduction_indices=[<span class="number">1</span>])</span><br><span class="line">    )</span><br><span class="line">    tf.summary.scalar(<span class="string">'lossoft'</span>,lossoft)</span><br><span class="line">    </span><br><span class="line"><span class="keyword">with</span> tf.name_scope(<span class="string">'trainoft'</span>):</span><br><span class="line">    trainoft = tf.train.GradientDescentOptimizer(<span class="number">0.1</span>).minimize(lossoft)</span><br><span class="line">    </span><br><span class="line">sessoft = tf.Session()</span><br><span class="line">mergedoft = tf.summary.merge_all()</span><br><span class="line"></span><br><span class="line">writeroft = tf.summary.FileWriter(<span class="string">"logsofTempPrediciton/"</span>,sessoft.graph)</span><br><span class="line"></span><br><span class="line">initofsess = tf.global_variables_initializer()</span><br><span class="line">sessoft.run(initofsess)</span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">1000</span>):</span><br><span class="line">    sessoft.run(trainoft,feed_dict=&#123;xoft: xof1,yoft: yof1&#125;)</span><br><span class="line">    <span class="keyword">if</span> i % <span class="number">20</span> == <span class="number">0</span>:</span><br><span class="line">        result = sessoft.run(mergedoft,feed_dict=&#123;xoft: xof1,yoft: yof1&#125;)</span><br><span class="line">        writeroft.add_summary(result, i)</span><br><span class="line">    <span class="keyword">if</span> <span class="number">1</span> &lt; i &lt; <span class="number">100</span>:</span><br><span class="line">        print(sessoft.run(lossoft,feed_dict=&#123;xoft:xof1,yoft:yof1&#125;))</span><br><span class="line">    <span class="keyword">elif</span> i % <span class="number">50</span> == <span class="number">0</span>:</span><br><span class="line">        print(sessoft.run(lossoft,feed_dict=&#123;xoft:xof1,yoft:yof1&#125;))</span><br></pre></td></tr></table></figure>
