number">1</span>], <span class="string">'bo'</span>, label=<span class="string">'test_point'</span>)</span><br><span class="line">plt.xlabel(<span class="string">'sepal length'</span>)</span><br><span class="line">plt.ylabel(<span class="string">'sepal width'</span>)</span><br><span class="line">plt.legend()</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">KNode</span>:</span></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__init__</span><span class="params">(self,data,split,left,right)</span>:</span></span><br><span class="line">        self.data = data</span><br><span class="line">        self.split = split</span><br><span class="line">        self.left = left</span><br><span class="line">        self.right = right</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">KTree</span>:</span></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__init__</span><span class="params">(self,data)</span>:</span></span><br><span class="line">        k = len(data[<span class="number">0</span>])</span><br><span class="line">        <span class="function"><span class="keyword">def</span> <span class="title">Build</span><span class="params">(split,dataset)</span>:</span></span><br><span class="line">            <span class="keyword">if</span> <span class="keyword">not</span> dataset :</span><br><span class="line">                <span class="keyword">return</span> <span class="keyword">None</span></span><br><span class="line">            dataset.sort(key=<span class="keyword">lambda</span> x:x[split])</span><br><span class="line">            split_pos = len(dataset) // <span class="number">2</span></span><br><span class="line">            split_data = dataset[split_pos]</span><br><span class="line">            split_next = (split+<span class="number">1</span>)%k</span><br><span class="line">            </span><br><span class="line">            <span class="keyword">return</span> KNode(split_data,split,</span><br><span class="line">                        Build(split_next,dataset[:split_pos]),</span><br><span class="line">                        Build(split_next,dataset[split_pos+<span class="number">1</span>:]))</span><br><span class="line">            </span><br><span class="line">        self.root = Build(<span class="number">0</span>,data)</span><br><span class="line">        </span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">pre</span><span class="params">(root)</span>:</span></span><br><span class="line">    print(root.data)</span><br><span class="line">    <span class="keyword">if</span> root.left :</span><br><span class="line">        pre(root.left)</span><br><span class="line">    <span class="keyword">if</span> root.right :</span><br><span class="line">        pre(root.right)</span><br><span class="line">        </span><br><span class="line">        </span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">find_nearest</span><span class="params">(tree,point)</span>:</span></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">travel</span><span class="params">(node,target,r)</span>:</span></span><br><span class="line">        <span class="comment">#到了叶子 拉满 停止</span></span><br><span class="line">        <span class="keyword">if</span> node <span class="keyword">is</span> <span class="keyword">None</span>:</span><br><span class="line">            <span class="keyword">return</span> result([<span class="number">0</span>]*len(target),float(<span class="string">'inf'</span>),<span class="number">0</span>)</span><br><span class="line">        </span><br><span class="line">        <span class="comment">#访问+1</span></span><br><span class="line">        node_visited = <span class="number">1</span></span><br><span class="line">        <span class="comment">#记录切割维度</span></span><br><span class="line">        split_index = node.split</span><br><span class="line">        <span class="comment">#记录当前节点数据</span></span><br><span class="line">        node_pivot = node.data</span><br><span class="line">        </span><br><span class="line">        <span class="comment">#左右子树下降</span></span><br><span class="line">        <span class="keyword">if</span> target[split_index] &gt; node_pivot[split_index]:</span><br><span class="line">            node_nearer = node.right</span><br><span class="line">            node_further = node.left            </span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            node_nearer = node.left</span><br><span class="line">            node_further = node.right            </span><br><span class="line">            </span><br><span class="line">        <span class="comment">#近点子树下降</span></span><br><span class="line">        temp1 = travel(node_nearer,target,r)</span><br><span class="line">        </span><br><span class="line">        <span class="comment">#近点子树的最近点、最近距离</span></span><br><span class="line">        node_nearest = temp1.nearest_node</span><br><span class="line">        nearest_dist = temp1.nearest_dist</span><br><span class="line">        <span class="comment">#近点子树访问过的节点</span></span><br><span class="line">        node_visited += temp1.nodes_visited</span><br><span class="line">        </span><br><span class="line">        <span class="comment">#近点距离和当前半径</span></span><br><span class="line">        r = min(r,nearest_dist)</span><br><span class="line">            </span><br><span class="line">        temp_dist = abs(node_pivot[split_index]-target[split_index])</span><br><span class="line">        </span><br><span class="line">        <span class="keyword">if</span> r &lt; temp_dist:</span><br><span class="line">            <span class="keyword">return</span> result(node_nearest,nearest_dist,node_visited)</span><br><span class="line">            </span><br><span class="line">        <span class="comment">#当前节点与目标的欧式距离</span></span><br><span class="line">        temp_dist = sqrt(sum((p1 - p2) ** <span class="number">2</span> <span class="keyword">for</span> p1, p2 <span class="keyword">in</span> zip(node_pivot, target)))     </span><br><span class="line">        </span><br><span class="line">        <span class="comment">#当前节点的最近点、最近距离</span></span><br><span class="line">        <span class="keyword">if</span> temp_dist &lt; r :</span><br><span class="line">            node_nearest = node_pivot</span><br><span class="line">            nearest_dist = temp_dist</span><br><span class="line">            r = temp_dist</span><br><span class="line">        </span><br><span class="line">        <span class="comment">#远点子树下降</span></span><br><span class="line">        temp2 = travel(node_further,target,r)</span><br><span class="line">        </span><br><span class="line">        <span class="comment">#远点子树访问过的节点</span></span><br><span class="line">        node_visited += temp2.nodes_visited</span><br><span class="line">        </span><br><span class="line">        <span class="comment">#远点子树最近点、最近距离</span></span><br><span class="line">        <span class="keyword">if</span> temp2.nearest_dist &lt; r:</span><br><span class="line">            nearest_node = temp2.nearest_node</span><br><span class="line">            r = temp2.nearest_dist</span><br><span class="line">        </span><br><span class="line">        <span class="keyword">return</span> result(node_nearest,nearest_dist,node_visited)</span><br><span class="line">        </span><br><span class="line">    <span class="keyword">return</span> travel(tree.root,point,float(<span class="string">'inf'</span>))</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">N = <span class="number">400000</span></span><br><span class="line">t0 = clock()</span><br><span class="line">k2 = KTree(random_points(<span class="number">3</span>, N))            <span class="comment"># 构建包含四十万个3维空间样本点的kd树</span></span><br><span class="line">ret2 = find_nearest(k2, [<span class="number">0.1</span>,<span class="number">0.5</span>,<span class="number">0.8</span>])      <span class="comment"># 四十万个样本点中寻找离目标最近的点</span></span><br><span class="line">t1 = clock()</span><br><span class="line"><span class="keyword">print</span> (<span class="string">"time: "</span>,t1-t0, <span class="string">"s"</span>)</span><br><span class="line"><span class="keyword">print</span> (ret2)</span><br><span class="line"></span><br><span class="line">time:  <span class="number">6.332138006363039</span> s</span><br><span class="line">Result_tuple(nearest_node=[<span class="number">0.10724035146914346</span>, <span class="number">0.4958958077773161</span>, <span class="number">0.7852891623487978</span>], nearest_dist=<span class="number">0.016901947449850196</span>, nodes_visited=<span class="number">73</span>)</span><br></pre></td></tr></table></figure>
